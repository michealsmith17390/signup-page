<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#004080;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#004080;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0059b3;
}

#error{
    margin-top:15px;
    text-align:center;
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>FTC Safety Locker</h2>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Login</button>

    <div id="error"></div>
</div>

<script>
function login() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(username === "locker1903" && password === "Qfdsff@76345"){
        alert("Login Successful!");
        // Redirect to dashboard page
        window.location.href = "dashboard.html";
    }
    else{
        document.getElementById("error").innerHTML =
            "Invalid username or password.";
    }

}
</script>

</body>
</html>
