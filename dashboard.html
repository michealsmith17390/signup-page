<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ftc Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#004080;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h2{
    color:#004080;
    margin-bottom:20px;
}

.account{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:15px;
}

.account-info{
    line-height:1.8;
}

.balance{
    text-align:right;
}

.balance h3{
    color:#28a745;
    font-size:28px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#777;
}
</style>

</head>
<body>

<div class="header">
    <h1>FTC Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Account Summary</h2>

        <div class="account">

            <div class="account-info">
                <h3>SafeGuard Account</h3>
                <p><strong>Account Number:</strong> XXXX XXXX 2100</p>
                <p><strong>Account Holder:</strong> Robert Parker</p>
            </div>

            <div class="balance">
                <p>Available Balance</p>
                <h3>$10,000.00</h3>
            </div>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 My Bank. All Rights Reserved.
</div>

</body>
</html>
