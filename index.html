<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Bank Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;

}

body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:#fff;
    padding:30px;
    border-radius:10px;

h2{
    text-align:center;
    color:#004080;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

textarea{
    resize:vertical;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:5px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.create{
    background:#0066cc;
}

.create:hover{
    background:#004d99;
}

.login{
    background:#28a745;
}

.login:hover{
    background:#218838;
}
