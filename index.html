<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Account Sign Up</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:420px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#004080;
}

input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#004c99;
}

.success{
    color:green;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Create FTC Safety Locker</h2>

<form id="signupForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="date"
id="dob"
required>

<select id="accountType" required>
<option value="">Select Account Type</option>
<option>Checking Account</option>
<option>Savings Account</option>
<option>SafeGuard Account</option>
</select>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">
Create Account
</button>

</form>

<div class="success" id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ukavntvdpfjgzknhpiwt.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "sb_publishable_vEyh1743m-lECQqNI4Tufw_j8Z1E_-I";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

document.getElementById("signupForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (password !== confirm) {
        alert("Passwords do not match.");
        return;
    }

    // Generate account number
    let accountNumber = "";

    for (let i = 0; i < 12; i++) {
        accountNumber += Math.floor(Math.random() * 10);
    }

    const customer = {
        account_number: accountNumber,
        full_name: document.getElementById("fullname").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        dob: document.getElementById("dob").value,
        account_type: document.getElementById("accountType").value
    };

    const { error } = await supabase
        .from("customers")
        .insert([customer]);

    if (error) {
        alert(error.message);
        return;
    }

    localStorage.setItem("accountNumber", accountNumber);
    localStorage.setItem("fullName", customer.full_name);

    document.getElementById("message").innerHTML =
        "Account created successfully. Redirecting...";

    setTimeout(function () {
        window.location.href = "account.html";
    }, 1000);

});
</script>
